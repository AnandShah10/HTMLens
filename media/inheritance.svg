<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- VS Code window mock -->
  <rect width="800" height="500" fill="#1e1e1e" rx="8"/>
  
  <!-- Title bar -->
  <rect width="800" height="35" fill="#323233" rx="8"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="100" y="23" fill="#cccccc" font-family="Arial" font-size="13">child.html - HTMLens • Template Inheritance</text>
  
  <!-- Left: Editor with child template -->
  <rect x="10" y="50" width="360" height="420" fill="#1f2937" rx="6"/>
  <text x="30" y="75" fill="#e0f2fe" font-family="monospace" font-size="12">{% extends "base.html" %}</text>
  <text x="30" y="95" fill="#a5f3fc" font-family="monospace" font-size="12">{% block content %}</text>
  <text x="50" y="120" fill="#bae6fd" font-family="monospace" font-size="12">  Custom child content here...</text>
  
  <!-- Right: Resolved preview -->
  <rect x="390" y="50" width="390" height="420" fill="#f8fafc" rx="6"/>
  <rect x="390" y="50" width="390" height="36" fill="#0ea5e9"/>
  <text x="420" y="72" fill="white" font-family="Arial" font-size="14" font-weight="bold">✅ Resolved Template Inheritance</text>
  
  <!-- Combined output visualization -->
  <rect x="420" y="100" width="330" height="45" fill="#1e40af" rx="6"/>
  <text x="450" y="127" fill="#dbeafe" font-family="Arial" font-size="15">Base Navigation + Child Content</text>
  
  <rect x="420" y="160" width="330" height="140" fill="white" stroke="#64748b" stroke-width="4" rx="10"/>
  <text x="450" y="185" fill="#1e2937" font-family="Arial" font-size="14">◉ Base Header</text>
  <text x="450" y="210" fill="#334155" font-family="Arial" font-size="13">◉ Child block content merged successfully</text>
  <text x="450" y="235" fill="#334155" font-family="Arial" font-size="13">◉ Base footer preserved</text>
  
  <!-- Info boxes -->
  <rect x="420" y="320" width="150" height="55" fill="#ecfdf5" stroke="#10b981" rx="6"/>
  <text x="440" y="345" fill="#065f46" font-size="12">base.html found in workspace</text>
  <text x="440" y="365" fill="#065f46" font-size="12">2 blocks merged</text>
  
  <rect x="590" y="320" width="130" height="55" fill="#fefce8" stroke="#ca8a04" rx="6"/>
  <text x="610" y="345" fill="#713f12" font-size="11">{% static %} tag</text>
  <text x="610" y="365" fill="#713f12" font-size="11">stripped with comment</text>
  
  <text x="420" y="470" fill="#64748b" font-family="Arial" font-size="11">Inheritance depth: 1 • Includes resolved recursively</text>
</svg>
