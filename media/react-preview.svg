<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <!-- VS Code window mock -->
  <rect width="800" height="520" fill="#1e1e1e" rx="8"/>
  
  <!-- Title bar -->
  <rect width="800" height="35" fill="#323233" rx="8"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="100" y="23" fill="#cccccc" font-family="Arial" font-size="13">react-example.jsx - HTMLens</text>
  
  <!-- Editor pane -->
  <rect x="0" y="35" width="370" height="485" fill="#1e1e1e"/>
  <rect x="0" y="35" width="370" height="28" fill="#28282b"/>
  <text x="15" y="54" fill="#22d3ee" font-family="monospace" font-size="11">export default function Counter() &#123;</text>
  
  <!-- Preview pane -->
  <rect x="380" y="35" width="420" height="485" fill="#0f172a"/>
  <rect x="380" y="35" width="420" height="36" fill="#1e2937"/>
  <text x="400" y="57" fill="#67e8f9" font-family="Arial" font-size="15" font-weight="700">⚛️ React 18 Preview (Babel Transpiled)</text>
  
  <!-- Rendered React component -->
  <rect x="420" y="90" width="340" height="340" fill="#ffffff" rx="20"/>
  
  <!-- Component UI -->
  <rect x="460" y="120" width="260" height="50" fill="#4f46e5" rx="12"/>
  <text x="510" y="150" fill="#ffffff" font-family="system-ui" font-size="17" font-weight="700">React Preview Demo</text>
  
  <text x="490" y="195" fill="#334155" font-family="system-ui" font-size="15">Hello from HTMLens React Preview! 🚀</text>
  
  <!-- Counter display -->
  <rect x="490" y="220" width="160" height="85" fill="#f8fafc" rx="12" stroke="#e2e8f0" stroke-width="6"/>
  <text x="535" y="265" fill="#0ea5e9" font-family="system-ui" font-size="42" font-weight="700">42</text>
  
  <!-- Buttons -->
  <rect x="450" y="330" width="100" height="38" rx="8" fill="#4f46e5"/>
  <text x="465" y="353" fill="white" font-family="Arial" font-size="12" font-weight="600">Increment</text>
  
  <rect x="570" y="330" width="100" height="38" rx="8" fill="#64748b"/>
  <text x="585" y="353" fill="white" font-family="Arial" font-size="12" font-weight="600">Decrement</text>
  
  <!-- Warning banner for imports -->
  <rect x="410" y="400" width="370" height="52" fill="#fef3c7" rx="8"/>
  <text x="430" y="422" fill="#b45309" font-family="Arial" font-size="12" font-weight="600">⚠️ Local imports stripped (no bundler)</text>
  <text x="430" y="442" fill="#b45309" font-family="Arial" font-size="11">import React from 'react' was kept • ./localModule removed</text>
  
  <text x="410" y="490" fill="#94a3b8" font-family="Arial" font-size="11">Rendered via CDN React 18 • Click buttons work in preview</text>
</svg>
