<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- VS Code window mock -->
  <rect width="800" height="500" fill="#1e1e1e" rx="8"/>
  
  <!-- Title bar -->
  <rect width="800" height="35" fill="#323233" rx="8"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="100" y="23" fill="#cccccc" font-family="Arial" font-size="13">html-example.html - HTMLens</text>
  
  <!-- Sidebar -->
  <rect x="0" y="35" width="50" height="465" fill="#252526"/>
  <rect x="50" y="35" width="200" height="465" fill="#2d2d2e"/>
  
  <!-- Editor area -->
  <rect x="250" y="35" width="300" height="465" fill="#1e1e1e"/>
  <rect x="250" y="35" width="300" height="30" fill="#1f1f23"/>
  <text x="270" y="55" fill="#d4d4d4" font-family="monospace" font-size="12">&lt;body&gt;</text>
  <text x="270" y="75" fill="#9cdcfe" font-family="monospace" font-size="12">  Welcome to HTMLens</text>
  
  <!-- Preview panel (right side) -->
  <rect x="550" y="35" width="250" height="465" fill="#ffffff"/>
  <rect x="550" y="35" width="250" height="35" fill="#f0f0f0"/>
  <text x="570" y="57" fill="#333" font-family="Arial" font-size="14" font-weight="bold">HTMLens Preview</text>
  
  <!-- Preview content -->
  <rect x="570" y="90" width="210" height="60" fill="#4f46e5" rx="8"/>
  <text x="620" y="125" fill="white" font-family="Arial" font-size="16" font-weight="bold">HTMLens Demo</text>
  
  <text x="580" y="180" fill="#333" font-family="Arial" font-size="13">Live preview with CSS</text>
  <rect x="580" y="200" width="170" height="120" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" rx="6"/>
  <text x="600" y="225" fill="#334155" font-family="Arial" font-size="12">• Live updates</text>
  <text x="600" y="245" fill="#334155" font-family="Arial" font-size="12">• Asset rewriting</text>
  <text x="600" y="265" fill="#334155" font-family="Arial" font-size="12">• CSP compliant</text>
  
  <!-- Banner -->
  <rect x="570" y="380" width="210" height="35" fill="#fef3c7" rx="4"/>
  <text x="590" y="402" fill="#854d0e" font-family="Arial" font-size="11">✓ Preview updated in real-time</text>
  
  <text x="280" y="480" fill="#888" font-family="Arial" font-size="10">Editor • Split View Preview</text>
</svg>
