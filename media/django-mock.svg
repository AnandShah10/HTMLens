<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- VS Code window mock -->
  <rect width="800" height="500" fill="#1e1e1e" rx="8"/>
  
  <!-- Title bar -->
  <rect width="800" height="35" fill="#323233" rx="8"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="100" y="23" fill="#cccccc" font-family="Arial" font-size="13">django-example.html - HTMLens</text>
  
  <!-- Editor -->
  <rect x="0" y="35" width="380" height="465" fill="#1e1e1e"/>
  <rect x="0" y="35" width="380" height="30" fill="#1f1f23"/>
  <text x="20" y="55" fill="#d4d4d4" font-family="monospace" font-size="11">{% if user.is_premium %}</text>
  
  <!-- Preview panel -->
  <rect x="390" y="35" width="410" height="465" fill="#f8fafc"/>
  <rect x="390" y="35" width="410" height="35" fill="#334155"/>
  <text x="410" y="57" fill="#e0f2fe" font-family="Arial" font-size="14" font-weight="bold">HTMLens • Django Mock Preview</text>
  
  <!-- Mock rendered content -->
  <rect x="420" y="80" rx="8" ry="8" width="350" height="55" fill="#ec4899"/>
  <text x="450" y="105" fill="white" font-family="Arial" font-size="15" font-weight="600">🌟 Premium User Dashboard</text>
  
  <text x="430" y="160" fill="#1e2937" font-family="Arial" font-size="18" font-weight="bold">Welcome, Developer!</text>
  
  <!-- For loop simulation -->
  <rect x="420" y="190" width="350" height="85" fill="white" stroke="#cbd5e1" stroke-width="3" rx="8"/>
  <text x="440" y="215" fill="#334155" font-family="Arial" font-size="13" font-weight="600">Recent Items (repeats for each item)</text>
  <rect x="440" y="230" width="310" height="38" fill="#f1f5f9" rx="4"/>
  <text x="460" y="252" fill="#0f172a" font-family="monospace" font-size="12">Item Title • Status: active</text>
  
  <!-- Variable mock -->
  <rect x="420" y="300" width="160" height="32" fill="#a5f3fc" rx="4"/>
  <text x="435" y="320" fill="#164e63" font-family="monospace" font-size="13">{{ user.name }}</text>
  
  <!-- Warning banner -->
  <rect x="420" y="355" width="350" height="48" fill="#fefce8" stroke="#eab308" stroke-width="2" rx="6"/>
  <text x="440" y="375" fill="#713f12" font-family="Arial" font-size="11">⚠️ Unhandled: {% unknown_tag %}</text>
  <text x="440" y="392" fill="#713f12" font-family="Arial" font-size="11">→ {{ unresolved_variable }}</text>
  
  <text x="420" y="480" fill="#64748b" font-family="Arial" font-size="11">Toggle if/else with command • Mock rendering active</text>
</svg>
